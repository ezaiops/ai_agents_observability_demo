# OTel Collector Config (Trace-only Demo)
receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317 # 接收 Python 探针发来的数据

processors:
  batch:
    timeout: 1s

exporters:
  otlp/phoenix:
    endpoint: phoenix:4317
    tls:
      insecure: true

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlp/phoenix]
